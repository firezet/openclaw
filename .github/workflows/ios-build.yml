name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tools
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          brew install xcodegen

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Strip lint scripts from project.yml
        working-directory: apps/ios
        run: |
          # Use sed to remove preBuildScripts and postCompileScripts blocks
          # First install yq for reliable YAML editing
          brew install yq
          yq 'del(.targets.OpenClaw.preBuildScripts)' -i project.yml
          yq 'del(.targets.OpenClaw.postCompileScripts)' -i project.yml
          echo "Stripped lint scripts"
          grep -c "preBuildScripts" project.yml || echo "No preBuildScripts left"

      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version

      - name: Build unsigned IPA
        working-directory: apps/ios
        run: |
          xcodebuild build \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGN_STYLE=Automatic \
            ENABLE_BITCODE=NO \
            ENABLE_APP_INTENTS_METADATA_GENERATION=NO \
            OPENCLAW_CODE_SIGN_STYLE=Automatic \
            OPENCLAW_DEVELOPMENT_TEAM="" \
            OPENCLAW_APP_BUNDLE_ID=ai.openclaw.ios \
            OPENCLAW_APP_PROFILE="" \
            2>&1 | tee build_log.txt | tail -100

          if grep -q "BUILD SUCCEEDED" build_log.txt; then
            echo "Build succeeded!"
          else
            echo "=== Build errors ==="
            grep -E "error:" build_log.txt | grep -v "warning:" | grep -v "(indent)" | grep -v "(trailing)" | tail -20
            echo "Build failed!"
            exit 1
          fi

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "OpenClaw.app" -path "*/Release-iphoneos/*" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "OpenClaw.app" 2>/dev/null | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "Searching..."
            find ~/Library/Developer/Xcode/DerivedData -name "*.app" 2>/dev/null | head -10
            echo "App not found!"
            exit 1
          fi

          echo "Found app at: $APP_PATH"
          rm -rf "$APP_PATH/_CodeSignature" 2>/dev/null || true
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r OpenClaw.ipa Payload/
          echo "IPA created:"
          ls -lh OpenClaw.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-unsigned-iOS
          path: apps/ios/build/ipa/OpenClaw.ipa
          retention-days: 30

      - name: Create Release with IPA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-unsigned-latest
          name: "OpenClaw iOS (unsigned)"
          body: "Unsigned IPA — sign with your own certificate via AltStore, Sideloadly, or ios-deploy."
          files: apps/ios/build/ipa/OpenClaw.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
