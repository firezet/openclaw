name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tools
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          brew install xcodegen swiftformat swiftlint

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version

      - name: Build unsigned IPA (iOS target only, skip Watch)
        working-directory: apps/ios
        run: |
          # Build only the iOS app target, not the scheme (which includes Watch)
          xcodebuild build \
            -project OpenClaw.xcodeproj \
            -target OpenClaw \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGN_STYLE=Automatic \
            ENABLE_BITCODE=NO \
            ENABLE_APP_INTENTS_METADATA_GENERATION=NO \
            OPENCLAW_CODE_SIGN_STYLE=Automatic \
            OPENCLAW_DEVELOPMENT_TEAM="" \
            OPENCLAW_APP_BUNDLE_ID=ai.openclaw.ios \
            OPENCLAW_APP_PROFILE="" \
            GCC_PREPROCESSOR_DEFINITIONS='$(inherited) OPENCLAW_CODE_SIGN_STYLE=Automatic' \
            2>&1 | tee build_log.txt | tail -100

          # Find the .app
          APP_PATH=$(find build/DerivedData -name "OpenClaw.app" -path "*/Release-iphoneos/*" 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Looking for .app in alternate paths..."
            APP_PATH=$(find build/DerivedData -name "OpenClaw.app" 2>/dev/null | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "=== Build log errors ==="
            grep -E "error:|BUILD FAILED" build_log.txt | tail -30
            echo "App not found!"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"
          
          # Remove code signature data (make it truly unsigned)
          rm -rf "$APP_PATH/_CodeSignature" 2>/dev/null || true
          
          # Package into IPA
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r OpenClaw.ipa Payload/
          echo "IPA created:"
          ls -lh OpenClaw.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-unsigned-iOS
          path: apps/ios/build/ipa/OpenClaw.ipa
          retention-days: 30

      - name: Create Release with IPA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-unsigned-latest
          name: "OpenClaw iOS (unsigned)"
          body: "Unsigned IPA — sign with your own certificate via AltStore, Sideloadly, or ios-deploy."
          files: apps/ios/build/ipa/OpenClaw.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
