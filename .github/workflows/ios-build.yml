name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications/ | grep Xcode

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tools
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          brew install xcodegen

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      - name: Select Xcode 26 beta
        run: |
          # Find Xcode 26 or latest available
          XCODE_26=$(ls -d /Applications/Xcode_26* 2>/dev/null | head -1)
          if [ -n "$XCODE_26" ]; then
            echo "Found: $XCODE_26"
            sudo xcode-select -s "$XCODE_26/Contents/Developer"
          else
            echo "Xcode 26 not found, trying Xcode_16.4 or latest..."
            LATEST=$(ls -d /Applications/Xcode_* | sort -V | tail -1)
            echo "Using: $LATEST"
            sudo xcode-select -s "$LATEST/Contents/Developer"
          fi
          xcodebuild -version

      - name: Build unsigned IPA
        working-directory: apps/ios
        run: |
          # Build without code signing
          set +e
          xcodebuild clean build \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ENABLE_BITCODE=NO \
            2>&1 | tee build_log.txt | tail -200
          BUILD_EXIT=$?
          set -e
          
          echo "Build exit code: $BUILD_EXIT"
          
          # Find the .app
          APP_PATH=$(find build/DerivedData -name "OpenClaw.app" -path "*/Release-iphoneos/*" 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Looking for .app in alternate paths..."
            APP_PATH=$(find build/DerivedData -name "OpenClaw.app" 2>/dev/null | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "=== Build log tail ==="
            tail -50 build_log.txt
            echo "App not found!"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"
          
          # Package into IPA
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r OpenClaw.ipa Payload/
          echo "IPA created:"
          ls -lh OpenClaw.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-unsigned-iOS
          path: apps/ios/build/ipa/OpenClaw.ipa
          retention-days: 30

      - name: Create Release with IPA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-unsigned-latest
          name: "OpenClaw iOS (unsigned)"
          body: "Unsigned IPA — sign with your own certificate via AltStore, Sideloadly, or ios-deploy."
          files: apps/ios/build/ipa/OpenClaw.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
