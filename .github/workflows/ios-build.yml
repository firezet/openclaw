name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tools
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          brew install xcodegen

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      - name: Build unsigned IPA
        working-directory: apps/ios
        run: |
          # Build without code signing
          xcodebuild clean build \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ENABLE_BITCODE=NO \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            | tail -50

          # Find the .app
          APP_PATH=$(find build/DerivedData -name "OpenClaw.app" -path "*/Release-iphoneos/*" | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Looking for .app in alternate paths..."
            APP_PATH=$(find build/DerivedData -name "OpenClaw.app" | head -1)
          fi
          
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH" || echo "App not found!"
          
          # Package into IPA
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r OpenClaw.ipa Payload/
          echo "IPA created:"
          ls -lh OpenClaw.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-unsigned-iOS
          path: apps/ios/build/ipa/OpenClaw.ipa
          retention-days: 30

      - name: Upload IPA to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-unsigned-latest
          name: "OpenClaw iOS (unsigned)"
          body: "Unsigned IPA — sign with your own certificate via AltStore, Sideloadly, or ios-deploy."
          files: apps/ios/build/ipa/OpenClaw.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
